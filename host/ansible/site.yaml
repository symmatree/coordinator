---
# Shared host bootstrap for Rekon devices. One entry point; device_role selects
# the device-specific role layered on top of the shared docker-host role.
#
#   Coordinator (Pi 4B):  ansible-playbook host/ansible/site.yaml -e device_role=coordinator
#   Pod (Pi Zero 2 W):    ansible-playbook host/ansible/site.yaml -e device_role=pod
#
# Normally invoked via host/one_time.sh [coordinator|pod] (sets sync_repo=true).
# Coordinator behavior is identical to the former install-coordinator.yaml.

- name: Rekon host bootstrap
  hosts: localhost
  connection: local
  become: true
  vars:
    device_role: coordinator
    sync_repo: false
    repo_root: "{{ playbook_dir }}/../.."
    docker_users:
      - "{{ lookup('env', 'USER') }}"
  roles:
    - role: docker-host
    - role: coordinator
      when: device_role == 'coordinator'
    - role: pod
      when: device_role == 'pod'
  post_tasks:
    - name: Re-check reboot required after possible reboot
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_final

    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: >-
          Host bootstrap finished (device_role={{ device_role }}).
          {% if reboot_required_final.stat.exists %}
          Reboot still required (/var/run/reboot-required). Run ./host/one_time.sh {{ device_role }} again.
          {% elif host_reboot is defined and host_reboot.changed %}
          Reboot applied pending kernel/firmware updates. Run ./host/one_time.sh {{ device_role }} again if SSH dropped.
          {% else %}
          No pending kernel/firmware reboot. Use newgrp docker or re-login once if docker permission denied.
          {% endif %}
