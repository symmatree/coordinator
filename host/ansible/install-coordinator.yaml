---
# Install Docker, coordinator stack paths, coord CLI, and tracker profile defaults.
# Run from a coordinator checkout on the Pi (or against inventory group coordinator_hosts).
#
#   ansible-playbook host/ansible/install-coordinator.yaml
#
# Typical first boot (sync stack + CLI from checkout):
#   ./host/one_time.sh
#
# Manual equivalent:
#   ansible-playbook host/ansible/install-coordinator.yaml -e coordinator_sync_repo=true

- name: Coordinator host bootstrap (Pi 4B)
  hosts: localhost
  connection: local
  become: true
  vars:
    coordinator_repo_root: "{{ playbook_dir }}/../.."
    coordinator_stack_dir: /opt/stacks/coordinator
    coordinator_config_dir: /var/lib/coordinator/config
    coordinator_ipc_dir: /var/lib/coordinator/ipc
    coordinator_sync_repo: false
    docker_users:
      - "{{ ansible_user_id }}"
  tasks:
    - name: Assert arm64 host for coordinator container images
      ansible.builtin.assert:
        that:
          - ansible_architecture == "aarch64"
        fail_msg: >-
          Coordinator images are linux/arm64. Install 64-bit Raspberry Pi OS on Pi 4B.

    - name: Install packages for Docker apt repo
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      when: ansible_os_family == "Debian"

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('aarch64', 'arm64') | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/{{ ansible_distribution | lower }}
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        name:
          - docker-buildx-plugin
          - docker-ce
          - docker-ce-cli
          - docker-compose-plugin
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"

    - name: Ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Add operator user to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
      register: docker_group_membership

    - name: Enable and start Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Create coordinator state directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ coordinator_stack_dir }}"
        - "{{ coordinator_config_dir }}"
        - "{{ coordinator_ipc_dir }}"

    - name: Sync stack files from checkout
      ansible.builtin.copy:
        src: "{{ coordinator_repo_root }}/stacks/coordinator/"
        dest: "{{ coordinator_stack_dir }}/"
        mode: preserve
      when: coordinator_sync_repo

    - name: Install coord CLI
      ansible.builtin.copy:
        src: "{{ coordinator_repo_root }}/bin/coord"
        dest: /usr/local/bin/coord
        mode: "0755"
      when: coordinator_sync_repo

    - name: Reboot to apply docker group membership
      ansible.builtin.reboot:
        msg: Coordinator bootstrap -- apply docker group membership
        reboot_timeout: 600
      when: docker_group_membership.changed

    - name: Bootstrap complete
      ansible.builtin.debug:
        msg: >-
          Host bootstrap finished.
          {% if docker_group_membership.changed %}
          Reboot applied docker group membership.
          {% else %}
          Docker group unchanged (re-login only if docker permission denied).
          {% endif %}
          Next with OAK-D on USB3: coord pull, coord start, coord logs -f vio-tracker.
          See docs/bench-tracker.md.
