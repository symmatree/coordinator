---
# Coordinator (Pi 4B) specifics: OAK-D udev rules, then the coordinator stack.
# Behavior matches the former install-coordinator.yaml.

- name: Install Luxonis udev rules for OAK-D (MyriadX USB re-enumeration)
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/80-movidius.rules
    content: 'SUBSYSTEM=="usb", ATTRS{idVendor}=="03e7", MODE="0666"'
    mode: "0644"
  notify: Reload udev rules

- name: Install coordinator stack and state dirs
  ansible.builtin.include_role:
    name: coord-stack
  vars:
    coord_stack_name: coordinator
    coord_state_root: /var/lib/coordinator
    coord_state_subdirs:
      - config
      - ipc
      # OAK-D captures (disparity + stills): in-tracker capture and the standalone
      # oak-still-capture container both bind-mount this as /captures (#72).
      - captures

# Seed the vins_fusion calibration. force: false so a flight-refined oak_d.yaml
# on the Pi survives re-provisioning (it is a starting calibration -- see the
# file header and docs/bench-estimator.md).
- name: Seed OAK-D VINS calibration (does not overwrite local refinement)
  ansible.builtin.copy:
    src: oak_d.yaml
    dest: /var/lib/coordinator/config/oak_d.yaml
    mode: "0644"
    force: false

# Host-side VIO tools: vio-pose-tap (decode chobits_server pose to CSV) and
# vio-ipc-record (raw multi-socket capture of chobits_* streams for replay, #35).
# Gated on sync_repo like the coord CLI.
- name: Install host VIO tools
  ansible.builtin.copy:
    src: "{{ repo_root }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    mode: "0755"
  loop:
    - vio-pose-tap
    - vio-ipc-record
  when: sync_repo | bool

# FC serial link for coordinator-mavlink. The router talks to the flight
# controller over the primary UART (GPIO14/15) at 1.5 Mbaud, which needs the
# PL011 (ttyAMA0), not the mini-UART -- so disable-bt remaps /dev/serial0 ->
# /dev/ttyAMA0 and frees a stable high-baud port (trades away onboard Bluetooth).
# Standard Pi-4 recipe; confirm the alias on the bench. Reboot required.
- name: Enable PL011 UART for the FC link (config.txt)
  ansible.builtin.blockinfile:
    path: /boot/firmware/config.txt
    marker: "# {mark} COORDINATOR FC UART"
    block: |
      enable_uart=1
      dtoverlay=disable-bt
  notify: Reboot required for UART

- name: Free the primary UART from the serial console (cmdline.txt)
  ansible.builtin.replace:
    path: /boot/firmware/cmdline.txt
    regexp: '\s*console=(serial0|ttyAMA0|ttyS0),[0-9]+'
    replace: ''
  notify: Reboot required for UART

- name: Disable serial-getty on the FC UART
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
    state: stopped
  loop:
    - serial-getty@ttyAMA0.service
    - serial-getty@ttyS0.service
  failed_when: false
