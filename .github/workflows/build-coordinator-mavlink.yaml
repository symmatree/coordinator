name: build-coordinator-mavlink
on:
  push:
    branches: [main]
    paths:
      - containers/coordinator-mavlink/**
      - .github/workflows/build-coordinator-mavlink.yaml
  pull_request:
    paths:
      - containers/coordinator-mavlink/**
      - .github/workflows/build-coordinator-mavlink.yaml
  workflow_dispatch: {}

jobs:
  build-coordinator-mavlink:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      IMAGE_NAME: ghcr.io/symmatree/coordinator-mavlink
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker-metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag

      # The Dockerfile runs the router isolation test at build time, so this
      # build also validates the proxy on native arm64.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/coordinator-mavlink
          file: containers/coordinator-mavlink/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
