name: build-vio-estimator
on:
  push:
    branches: [main]
    paths:
      - containers/vio-estimator/**
      - .github/workflows/build-vio-estimator.yaml
  pull_request:
    paths:
      - containers/vio-estimator/**
      - .github/workflows/build-vio-estimator.yaml
  workflow_dispatch: {}

jobs:
  build-vio-estimator:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      IMAGE_NAME: ghcr.io/symmatree/coordinator-vio-estimator
    steps:
      - uses: actions/checkout@v4

      - name: Read upstream pins
        id: pins
        run: |
          set -a
          # shellcheck disable=SC1091
          source containers/vio-estimator/upstream.lock
          set +a
          {
            echo "vins_fusion_branch=${VINS_FUSION_BRANCH}"
            echo "vins_fusion_sha=${VINS_FUSION_SHA}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker-metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/vio-estimator
          file: containers/vio-estimator/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          # On PRs, load the built image into the local docker so the smoke test can
          # run it (native arm64 on the arm runner). main just pushes (the PR gated it).
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          build-args: |
            VINS_FUSION_BRANCH=${{ steps.pins.outputs.vins_fusion_branch }}
            VINS_FUSION_SHA=${{ steps.pins.outputs.vins_fusion_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke: boot the estimator, replay a tiny fixture, assert finite pose. PR-only
      # (main pushes the already-gated image). See containers/vio-estimator/test.sh.
      - name: Smoke test
        if: github.event_name == 'pull_request'
        env:
          RUNTIME: docker
          IMAGE: ${{ fromJSON(steps.docker-metadata.outputs.json).tags[0] }}
        run: bash containers/vio-estimator/test.sh
