name: build-pod-camera
on:
  push:
    branches: [main]
    paths:
      - containers/pod-camera/**
      - .github/workflows/build-pod-camera.yaml
  pull_request:
    paths:
      - containers/pod-camera/**
      - .github/workflows/build-pod-camera.yaml
  workflow_dispatch: {}

jobs:
  build-pod-camera:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      id-token: write
      packages: write
    env:
      IMAGE_NAME: ghcr.io/symmatree/coordinator-pod-camera
    steps:
      - uses: actions/checkout@v4

      - name: Read build inputs
        id: pins
        run: |
          set -a
          # shellcheck disable=SC1091
          source containers/pod-camera/upstream.lock
          set +a
          {
            echo "base_image=${BASE_IMAGE}"
            echo "rpi_suite=${RPI_SUITE}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: docker-metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable={{is_default_branch}}
            type=sha
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers/pod-camera
          file: containers/pod-camera/Dockerfile
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          build-args: |
            BASE_IMAGE=${{ steps.pins.outputs.base_image }}
            RPI_SUITE=${{ steps.pins.outputs.rpi_suite }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
