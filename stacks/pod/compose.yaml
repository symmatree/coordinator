# Pod stack (Pi Zero 2 W). Installed on the Zero at /opt/stacks/pod/.
# Manage with the shared CLI: coord pull | start | stop | status | logs [service]
#
# Profiles:
#   (default, empty): nothing starts -- host bootstrap only
#   capture:          pod-camera -- stills to local SD (Phase 2)
#   online:           capture + control API + alloy -- Phase 4 (services TBD)

services:
  pod-camera:
    image: ghcr.io/symmatree/coordinator-pod-camera:${POD_CAMERA_VERSION}
    container_name: pod_camera
    profiles: [capture, online]
    restart: unless-stopped
    # libcamera/IMX708 passthrough. privileged populates the container /dev with
    # host devices and lifts the device cgroup (same pattern as vio-tracker);
    # /run/udev lets libcamera enumerate the camera. If enumeration ever fails,
    # fall back to explicit devices (/dev/video*, /dev/media*, /dev/dma_heap,
    # vchiq). Verified end-to-end on hardware in #23.
    privileged: true
    volumes:
      - ${POD_CAPTURES_DIR}:/captures
      - ${POD_CONFIG_DIR}:/config:ro
      - /run/udev:/run/udev:ro
    env_file:
      - .env

x-dockge:
  urls: []
