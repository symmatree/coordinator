# Coordinator stack. Installed on Pi at /opt/stacks/coordinator/.
# Manage with: coord pull | start | stop | status | logs [service]
#
# Profiles:
#   tracker (default): vio-tracker only -- OAK-D feature extraction bench
#   bench:             vio-tracker + vio-estimator (estimator image TBD)
#   flight:            bench + coordinator-mavlink
#
# Images ship in a follow-up PR; tags from .env.

services:
  vio-tracker:
    image: ghcr.io/symmatree/coordinator-vio-tracker:${VIO_TRACKER_VERSION}
    container_name: coordinator_vio_tracker
    profiles: [tracker, bench, flight]
    privileged: true
    restart: unless-stopped
    volumes:
      # Bind-mount /dev/bus/usb (NOT `devices:`). When depthai uploads firmware
      # the MyriadX resets and re-enumerates to a new USB address/node. A static
      # `devices:` mapping snapshots nodes at container start, so the booted
      # device is invisible -> X_LINK_DEVICE_NOT_FOUND. A bind mount of the
      # directory propagates the new node live. (privileged: true opens the
      # device cgroup so the new node is usable.)
      - /dev/bus/usb:/dev/bus/usb
      - ${COORDINATOR_IPC_DIR}:/tmp
      - ${COORDINATOR_CONFIG_DIR}:/config:ro
    env_file:
      - .env

  vio-estimator:
    image: ghcr.io/symmatree/coordinator-vio-estimator:${VIO_ESTIMATOR_VERSION}
    container_name: coordinator_vio_estimator
    profiles: [bench, flight]
    restart: unless-stopped
    volumes:
      - ${COORDINATOR_IPC_DIR}:/tmp
      - ${COORDINATOR_CONFIG_DIR}:/config:ro
    env_file:
      - .env

  coordinator-mavlink:
    image: ghcr.io/symmatree/coordinator-mavlink:${MAVLINK_VERSION}
    container_name: coordinator_mavlink
    profiles: [flight]
    privileged: true
    restart: unless-stopped
    network_mode: host
    depends_on:
      - vio-estimator
    devices:
      - ${MAVLINK_DEVICE}:${MAVLINK_DEVICE}
    volumes:
      - ${COORDINATOR_IPC_DIR}:/tmp
    env_file:
      - .env
    environment:
      - MAVLINK_DEVICE
      - MAVLINK_BAUD

x-dockge:
  urls: []
